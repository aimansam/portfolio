<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portfolio Admin</title>
    <style>
      :root {
        color-scheme: dark;
        --admin-bg: #07111f;
        --admin-panel: rgba(10, 20, 36, 0.88);
        --admin-panel-border: rgba(148, 163, 184, 0.18);
        --admin-text: #e2e8f0;
        --admin-muted: #94a3b8;
        --admin-accent: #f59e0b;
        --admin-danger: #fca5a5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", sans-serif;
        color: var(--admin-text);
        background:
          radial-gradient(circle at top, rgba(245, 158, 11, 0.14), transparent 28%),
          linear-gradient(160deg, #020617 0%, var(--admin-bg) 52%, #0f172a 100%);
      }

      body.cms-ready #admin-shell {
        display: none;
      }

      #admin-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      .admin-card {
        width: min(100%, 34rem);
        padding: 2rem;
        border: 1px solid var(--admin-panel-border);
        border-radius: 1.5rem;
        background: var(--admin-panel);
        backdrop-filter: blur(18px);
        box-shadow: 0 28px 60px rgba(2, 6, 23, 0.45);
      }

      .admin-brand {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.25rem;
      }

      .admin-brand img {
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 1rem;
        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .admin-brand strong {
        display: block;
        font-size: 1.1rem;
        font-weight: 700;
      }

      .admin-brand span {
        display: block;
        margin-top: 0.2rem;
        color: var(--admin-muted);
        font-size: 0.95rem;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.8rem, 4vw, 2.4rem);
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--admin-muted);
        line-height: 1.65;
      }

      .admin-links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.5rem;
      }

      .admin-links a {
        color: var(--admin-text);
        text-decoration: none;
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 999px;
        padding: 0.72rem 1rem;
        transition: border-color 180ms ease, transform 180ms ease;
      }

      .admin-links a:hover {
        border-color: rgba(245, 158, 11, 0.7);
        transform: translateY(-1px);
      }

      .admin-status {
        margin-top: 1.25rem;
        color: var(--admin-accent);
        font-size: 0.95rem;
      }

      .admin-status[data-state="error"] {
        color: var(--admin-danger);
      }
    </style>
  </head>
  <body>
    <main id="admin-shell">
      <section class="admin-card" aria-live="polite">
        <div class="admin-brand">
          <img src="/assets/images/8443.jpg" alt="Aiman Sam portrait">
          <div>
            <strong>Portfolio Admin</strong>
            <span>Manage homepage content and Hugo blog posts</span>
          </div>
        </div>
        <h1>Loading Decap CMS</h1>
        <p>Use this panel to edit portfolio sections, publish blog entries, and keep the live site current without touching the repo by hand.</p>
        <div class="admin-links">
          <a href="/" target="_blank" rel="noopener noreferrer">Open portfolio</a>
          <a href="/blog/" target="_blank" rel="noopener noreferrer">Open blog</a>
          <a href="https://github.com/aimansam/portfolio/issues" target="_blank" rel="noopener noreferrer">Report admin issue</a>
        </div>
        <p class="admin-status" id="admin-status">Initializing editor and loading config…</p>
      </section>
    </main>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.5.0/dist/decap-cms.js"></script>
    <script>
      const isLocalHost = ['localhost', '127.0.0.1'].includes(window.location.hostname);
      const statusElement = document.getElementById('admin-status');

      function setStatus(message, state = 'loading') {
        if (!statusElement) {
          return;
        }

        statusElement.textContent = message;
        statusElement.dataset.state = state;
      }

      async function initializeAdmin() {
        setStatus('Loading CMS configuration...');
        const response = await fetch('./config.yml');

        if (!response.ok) {
          throw new Error(`Failed to load CMS config: ${response.status}`);
        }

        const config = window.jsyaml.load(await response.text());

        if (isLocalHost) {
          delete config.publish_mode;
        }

        setStatus('Starting the editor interface...');
        window.initCMS({ config });
        document.body.classList.add('cms-ready');
      }

      initializeAdmin().catch((error) => {
        console.error(error);
        setStatus('Unable to initialize the admin UI. Check the browser console for details.', 'error');
      });
    </script>
  </body>
</html>
