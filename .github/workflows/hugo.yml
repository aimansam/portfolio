name: Deploy Portfolio and Blog
on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # This ensures submodules (like PaperMod) are actually downloaded
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo Blog
        run: |
          # If blog-source exists, go inside. Otherwise, build from root.
          if [ -d "blog-source" ]; then
            cd blog-source
            hugo --minify
          else
            hugo --minify
          fi

      - name: Sync Homepage SEO
        run: |
          chmod +x ./scripts/sync-seo.sh
          ./scripts/sync-seo.sh ./content/site/seo.json ./index.html
          
      - name: Organize Files
        run: |
          mkdir staging
          # 1. Copy root portfolio files (excluding source/git folders)
          # This assumes your main portfolio is at the root
          rsync -av --exclude='blog-source' --exclude='public' --exclude='.git*' --exclude='staging' ./ staging/
          
          # 2. Create the /blog folder
          mkdir -p staging/blog
          
          # 3. Find where the Hugo 'public' folder was generated and move it
          if [ -d "blog-source/public" ]; then
            cp -r blog-source/public/* staging/blog/
          elif [ -d "public" ]; then
            cp -r public/* staging/blog/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./staging

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
