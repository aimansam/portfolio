baseURL = 'https://portfolio.aimansam.my/blog/'
locale = 'en-us'
title = 'zx10r Security Notes'
theme = "PaperMod"

enableRobotsTXT = true
summaryLength = 24

[params]
	author = 'zx10r'
	description = 'Security writeups, lab notes, CTF workflows, and lessons from practical offensive and defensive security work.'
	defaultTheme = 'auto'
	ShowReadingTime = true
	ShowPostNavLinks = true
	ShowBreadCrumbs = true
	ShowCodeCopyButtons = true
	ShowRssButtonInSectionTermList = true
	ShowShareButtons = false
	disableSpecial1stPost = true
	comments = false

	[params.footer]
		text = 'Security notes by zx10r'

	[params.homeInfoParams]
		Title = 'Security notes from the lab.'
		Content = 'CTF writeups, Active Directory lab notes, web exploitation workflows, and lessons from building practical security skills.'

